services:
  portfolio:
    build: .
    container_name: axel-portfolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=file:/app/data/prod.db
    volumes:
      # Volumen administrado por Docker: hereda permisos del usuario del contenedor.
      # Respaldo: docker cp axel-portfolio:/app/data/prod.db ./prod-backup.db
      - portfolio-data:/app/data

volumes:
  portfolio-data:
